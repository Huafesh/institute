<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo VFX-JS + Canvas</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            /* Evita barras de scroll */
            background-color: #111;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>

    <canvas id="canvas"></canvas>

    <script type="module">
        import { VFX } from "https://esm.sh/@vfx-js/core";

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        // Inicializamos la librería
        const vfx = new VFX();

        // Ajustamos el canvas al tamaño de la ventana
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- 1. Definimos el Shader (El efecto visual) ---
        // Este shader hace un efecto de "RGB Shift" (Glitch cromático)
        const shader = `
            precision highp float;
            uniform vec2 resolution;
            uniform vec2 offset;
            uniform float time;
            uniform sampler2D src;

            void main() {
                vec2 uv = gl_FragCoord.xy / resolution;
                
                // Desplazamiento de colores basado en el tiempo
                float r = texture2D(src, uv + vec2(sin(time * 5.0) * 0.01, 0.0)).r;
                float g = texture2D(src, uv).g;
                float b = texture2D(src, uv - vec2(sin(time * 5.0) * 0.01, 0.0)).b;
                float a = texture2D(src, uv).a;

                gl_FragColor = vec4(r, g, b, a);
            }
        `;

        // --- 2. Añadimos el efecto al canvas ---
        vfx.add(canvas, { shader });

        // Variables para la animación del texto rebotando
        let x = 100, y = 100;
        let dx = 4, dy = 4;

        // --- 3. Bucle de Animación ---
        function drawCanvas() {
            // A. Limpiamos y dibujamos en modo 2D normal
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Fondo semitransparente para efecto de rastro (opcional)
            // ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            // ctx.fillRect(0,0, canvas.width, canvas.height);

            // Dibujar Texto
            ctx.fillStyle = "#00ffcc"; // Color Cyan
            ctx.font = "bold 80px Arial";
            ctx.textAlign = "center";
            ctx.fillText("VFX-JS", x, y);

            // Dibujar un círculo
            ctx.beginPath();
            ctx.arc(x, y + 60, 20, 0, Math.PI * 2);
            ctx.fillStyle = "#ff0055";
            ctx.fill();

            // Lógica de rebote
            if (x + 100 > canvas.width || x - 100 < 0) dx = -dx;
            if (y + 60 > canvas.height || y - 60 < 0) dy = -dy;
            x += dx;
            y += dy;

            // B. ¡IMPORTANTE! Avisamos a VFX-JS que el canvas cambió
            vfx.update(canvas);

            requestAnimationFrame(drawCanvas);
        }

        // Iniciar
        drawCanvas();
    </script>
</body>

</html>
