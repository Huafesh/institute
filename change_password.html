<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña | Ceind Institute</title>
    <link rel="icon" type="image/png" href="assets/Favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* --- ESTILOS COMPARTIDOS (Mismos que Login) --- */
        :root {
            --primary-color: #003d80;
            --secondary-color: #00a8ff;
            --white: #ffffff;
            --text-color: #555;
            --bg-color: #f4f7f6;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --card-bg: #ffffff;
            --title-color: #003d80;
            --success: #2ecc71;
        }

        body.dark-mode {
            --bg-color: #0f0f0f;
            --card-bg: #1e1e1e;
            --text-color: #d0d0d0;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        body.dark-mode .login-container {
            background: var(--card-bg);
        }

        body.dark-mode input {
            background: #2c2c2c;
            border-color: #444;
            color: #fff;
        }

        body.dark-mode .form-header h3 {
            color: #fff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(rgba(0, 61, 128, 0.05), rgba(0, 61, 128, 0.05)), url('https://www.transparenttextures.com/patterns/cubes.png');
        }

        .login-container {
            background: var(--white);
            width: 100%;
            max-width: 900px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            min-height: 550px;
        }

        /* Lado Izquierdo */
        .login-brand {
            flex: 1;
            background: linear-gradient(135deg, var(--primary-color), #002a5c);
            color: var(--white);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-brand::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            top: -50px;
            left: -50px;
        }

        .login-brand::after {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            bottom: -30px;
            right: -30px;
        }

        .login-brand i {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .login-brand h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .login-brand p {
            opacity: 0.8;
            font-weight: 300;
        }

        /* Lado Derecho */
        .login-form {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .form-header h3 {
            font-size: 1.8rem;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .form-header p {
            color: #888;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-color);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }

        .input-wrapper .toggle-password {
            left: auto;
            right: 15px;
            cursor: pointer;
        }

        .input-wrapper .toggle-password:hover {
            color: var(--secondary-color);
        }

        .input-group input {
            width: 100%;
            padding: 12px 45px 12px 45px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-family: inherit;
            transition: 0.3s;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(0, 168, 255, 0.1);
        }

        .input-group input.error {
            border-color: #e74c3c;
            animation: shake 0.4s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 168, 255, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
                margin: 20px;
                min-height: auto;
            }

            .login-brand {
                padding: 30px;
            }

            .login-form {
                padding: 30px;
            }
        }
    </style>
</head>

<body>
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
                document.body.classList.add('dark-mode');
            }
        })();
    </script>

    <div class="login-container">
        <div class="login-brand">
            <i class="fas fa-key"></i>
            <h2>Nueva Clave</h2>
            <p>Asegura tu cuenta con una contraseña fuerte y única.</p>
        </div>

        <div class="login-form">
            <div class="form-header">
                <h3>Restablecer Contraseña</h3>
                <p>Ingresa tu nueva contraseña a continuación.</p>
            </div>

            <form onsubmit="confirmReset(event)">
                <div class="input-group">
                    <label for="new-pass">Nueva Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="new-pass" placeholder="Mínimo 6 caracteres" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePass('new-pass', this)"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirm-pass">Confirmar Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirm-pass" placeholder="Repite la contraseña" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Guardar Cambios</button>
            </form>
        </div>
    </div>

    <!-- Firebase Dependencies (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>

    <!-- Config -->
    <script src="js/firebase-config.js"></script>

    <script>
        // Toggle Password Visibility
        window.togglePass = function (fieldId, icon) {
            const input = document.getElementById(fieldId);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            // Assuming font-awesome 5/6 syntax:
            if (icon.classList.contains('fa-eye')) {
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        window.confirmReset = async function (event) {
            event.preventDefault();
            const newPass = document.getElementById('new-pass').value;
            const confirmPass = document.getElementById('confirm-pass').value;
            const btn = document.querySelector('.btn-submit');

            // 1. Validar que coincidan
            if (newPass !== confirmPass) {
                alert("Las contraseñas no coinciden.");
                document.getElementById('confirm-pass').classList.add('error');
                return;
            }

            // 2. Validar longitud
            if (newPass.length < 6) {
                alert("La contraseña debe tener al menos 6 caracteres.");
                return;
            }

            // 3. Obtener el código de acción de la URL
            const urlParams = new URLSearchParams(window.location.search);
            const actionCode = urlParams.get('oobCode');

            try {
                btn.innerText = "Guardando...";
                btn.disabled = true;

                if (actionCode) {
                    // Acción Real de Firebase
                    await auth.confirmPasswordReset(actionCode, newPass);
                    alert("¡Éxito! Tu contraseña ha sido cambiada.");
                    window.location.href = "login.html";
                } else {
                    // MODO DEMO
                    console.warn("Modo Demo: No se detectó código oobCode en la URL.");
                    await new Promise(r => setTimeout(r, 1000));
                    alert("(DEMO) Contraseña cambiada correctamente.");
                    window.location.href = "login.html";
                }

            } catch (error) {
                console.error(error);
                let msg = "Error al restablecer. El enlace puede haber expirado.";
                if (error.code === 'auth/invalid-action-code') msg = "El enlace es inválido o ya fue usado.";
                if (error.code === 'auth/weak-password') msg = "La contraseña es muy débil.";
                alert(msg);
                btn.innerText = "Guardar Cambios";
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
